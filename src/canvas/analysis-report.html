<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Analysis Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17;
    color: #e0e0e0;
    padding: 16px;
    min-height: 100vh;
  }

  .report-header {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #1e2636;
  }
  .report-header h1 { font-size: 20px; color: #fff; margin-bottom: 4px; }
  .report-header .meta { font-size: 12px; color: #6b7280; }

  /* Signal Hero */
  .signal-hero {
    background: #111827;
    border: 1px solid #1e2636;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .signal-text {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 4px;
  }
  .signal-LONG { color: #4ade80; }
  .signal-SHORT { color: #f87171; }
  .signal-HOLD { color: #94a3b8; }
  .conviction-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 12px;
  }
  .conviction-num {
    font-size: 32px;
    font-weight: 800;
  }
  .conviction-bar {
    width: 200px;
    height: 8px;
    background: #1e293b;
    border-radius: 4px;
    overflow: hidden;
  }
  .conviction-fill {
    height: 100%;
    border-radius: 4px;
  }
  .summary-text {
    font-size: 14px;
    color: #9ca3af;
    margin-top: 12px;
    line-height: 1.6;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Agent Cards */
  .agents-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 600px) {
    .agents-grid { grid-template-columns: 1fr; }
  }
  .agent-card {
    background: #111827;
    border: 1px solid #1e2636;
    border-radius: 12px;
    padding: 16px;
    border-left: 4px solid;
  }
  .agent-card.macro { border-left-color: #2563eb; }
  .agent-card.technical { border-left-color: #7c3aed; }
  .agent-card.risk { border-left-color: #ef454a; }
  .agent-card.manager { border-left-color: #ff8c00; }
  .agent-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .agent-icon { font-size: 20px; }
  .agent-name { font-weight: 600; font-size: 14px; color: #fff; }
  .agent-bias {
    margin-left: auto;
    padding: 2px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
  }
  .bias-BULLISH { background: #064e3b; color: #4ade80; }
  .bias-BEARISH { background: #450a0a; color: #f87171; }
  .bias-NEUTRAL { background: #1e293b; color: #94a3b8; }
  .bias-LOW { background: #064e3b; color: #4ade80; }
  .bias-MEDIUM { background: #422006; color: #fbbf24; }
  .bias-HIGH { background: #450a0a; color: #f87171; }
  .bias-EXTREME { background: #450a0a; color: #f87171; }
  .agent-summary {
    font-size: 13px;
    color: #9ca3af;
    line-height: 1.5;
  }
  .agent-confidence {
    font-size: 11px;
    color: #6b7280;
    margin-top: 6px;
  }

  /* Trading Plan */
  .plan-section {
    background: #111827;
    border: 1px solid #1e2636;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #9ca3af;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .plan-params {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  @media (max-width: 600px) {
    .plan-params { grid-template-columns: 1fr 1fr; }
  }
  .param-card {
    background: #0a0e17;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .param-label { font-size: 11px; color: #6b7280; }
  .param-value { font-size: 18px; font-weight: 700; color: #fff; margin-top: 2px; }

  .steps-list {
    list-style: none;
  }
  .step-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #1e2636;
  }
  .step-item:last-child { border-bottom: none; }
  .step-num {
    width: 28px;
    height: 28px;
    background: #1e293b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .step-content { flex: 1; }
  .step-action { font-size: 13px; font-weight: 600; color: #fff; }
  .step-note { font-size: 12px; color: #6b7280; margin-top: 2px; }

  .risk-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .risk-item { text-align: center; }
  .risk-label { font-size: 11px; color: #6b7280; }
  .risk-value { font-size: 16px; font-weight: 700; }

  /* Skills Section */
  .skills-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .skill-tag {
    padding: 4px 10px;
    background: #1e293b;
    border-radius: 6px;
    font-size: 11px;
    color: #9ca3af;
  }

  .footer {
    text-align: center;
    color: #374151;
    font-size: 11px;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid #1e2636;
  }
</style>
</head>
<body>

<div class="report-header">
  <h1 id="reportTitle">AI Analysis Report</h1>
  <div class="meta" id="reportMeta">--</div>
</div>

<!-- Signal Hero -->
<div class="signal-hero">
  <div class="signal-text signal-HOLD" id="heroSignal">HOLD</div>
  <div class="conviction-row">
    <span class="conviction-num" id="heroConviction">50</span>
    <span style="color:#6b7280; font-size:14px;">/ 100</span>
    <div class="conviction-bar">
      <div class="conviction-fill" id="heroConvictionFill" style="width:50%; background:#94a3b8;"></div>
    </div>
  </div>
  <div class="summary-text" id="heroSummary">--</div>
</div>

<!-- Agent Cards -->
<div class="section-title">Agent Analysis</div>
<div class="agents-grid" id="agentsGrid">
  <!-- Filled by JS -->
</div>

<!-- Trading Plan (optional) -->
<div class="plan-section" id="planSection" style="display:none;">
  <div class="section-title">Trading Plan</div>
  <div class="plan-params" id="planParams"></div>
  <ul class="steps-list" id="planSteps"></ul>
  <div class="risk-row" id="planRisk"></div>
</div>

<!-- Reasoning -->
<div class="plan-section" id="reasoningSection">
  <div class="section-title">Decision Reasoning</div>
  <div id="reasoningText" style="font-size:13px; color:#9ca3af; line-height:1.6;">--</div>
</div>

<!-- Skills Used -->
<div id="skillsSection" style="display:none;">
  <div class="section-title">Analysis Skills Used</div>
  <div class="skills-tags" id="skillsTags"></div>
</div>

<div class="footer">
  OKX AI Trading Co-Pilot &mdash; Analysis Report &mdash; <span id="footerTime"></span>
</div>

<script>
function updateReport(data) {
  if (!data) return;

  // Header
  const inst = data.instrument || 'BTC-USDT';
  document.getElementById('reportTitle').textContent = `${inst} AI Analysis Report`;
  document.getElementById('reportMeta').textContent =
    `${data.instType || 'SWAP'} | Mode: ${(data.mode || 'demo').toUpperCase()} | ${new Date().toLocaleString()}`;
  document.getElementById('footerTime').textContent = new Date().toLocaleString();

  // Signal Hero
  const signal = data.signal || 'HOLD';
  const heroEl = document.getElementById('heroSignal');
  heroEl.textContent = signal;
  heroEl.className = 'signal-text signal-' + signal;

  const conv = parseFloat(data.conviction || 50);
  document.getElementById('heroConviction').textContent = Math.round(conv);
  const fill = document.getElementById('heroConvictionFill');
  fill.style.width = conv + '%';
  fill.style.background = conv >= 70 ? '#4ade80' : conv >= 40 ? '#fbbf24' : '#f87171';

  document.getElementById('heroSummary').textContent = data.summary || '--';

  // Agents
  const agents = data.agents || {};
  const agentsGrid = document.getElementById('agentsGrid');
  const agentConfigs = {
    macro:     { icon: '🌐', name: 'Macro Analysis',     nameZh: '宏观分析', biasKey: 'bias' },
    technical: { icon: '📊', name: 'Technical Analysis',  nameZh: '技术分析', biasKey: 'bias' },
    risk:      { icon: '🛡️', name: 'Risk Assessment',    nameZh: '风险评估', biasKey: 'riskLevel' },
  };

  let agentHTML = '';
  for (const [id, cfg] of Object.entries(agentConfigs)) {
    const agent = agents[id];
    if (!agent) continue;
    const biasVal = agent[cfg.biasKey] || agent.bias || '--';
    agentHTML += `
      <div class="agent-card ${id}">
        <div class="agent-header">
          <span class="agent-icon">${cfg.icon}</span>
          <span class="agent-name">${cfg.nameZh}</span>
          <span class="agent-bias bias-${biasVal}">${biasVal}</span>
        </div>
        <div class="agent-summary">${agent.summary || '--'}</div>
        <div class="agent-confidence">Confidence: ${agent.confidence || '--'}%</div>
      </div>`;
  }
  agentsGrid.innerHTML = agentHTML || '<div class="no-data">No agent data available</div>';

  // Reasoning
  document.getElementById('reasoningText').textContent = data.reasoning || '--';

  // Trading Plan
  if (data.plan) {
    const planSection = document.getElementById('planSection');
    planSection.style.display = 'block';

    const params = data.plan.params || {};
    document.getElementById('planParams').innerHTML = [
      { label: 'Entry', value: params.entry ? '$' + params.entry.toLocaleString() : '--' },
      { label: 'Stop Loss', value: params.sl ? '$' + params.sl.toLocaleString() : '--' },
      { label: 'Take Profit', value: params.tp ? '$' + params.tp.toLocaleString() : '--' },
      { label: 'Leverage', value: params.leverage ? params.leverage + 'x' : '--' },
    ].map(p => `<div class="param-card"><div class="param-label">${p.label}</div><div class="param-value">${p.value}</div></div>`).join('');

    const steps = data.plan.executionSteps || [];
    document.getElementById('planSteps').innerHTML = steps.map(s =>
      `<li class="step-item">
        <div class="step-num">${s.step}</div>
        <div class="step-content">
          <div class="step-action">${s.action} ${s.price ? '@ $' + s.price.toLocaleString() : ''}</div>
          <div class="step-note">${s.note || ''}</div>
        </div>
      </li>`
    ).join('');

    const risk = data.plan.risk || {};
    document.getElementById('planRisk').innerHTML = [
      { label: 'Max Profit', value: risk.maxProfit || '--', cls: 'green' },
      { label: 'Max Loss', value: risk.maxLoss || '--', cls: 'red' },
      { label: 'Risk/Reward', value: risk.riskReward || '--', cls: '' },
    ].map(r => `<div class="risk-item"><div class="risk-label">${r.label}</div><div class="risk-value ${r.cls}">${r.value}</div></div>`).join('');
  }

  // Skills
  if (data.skills && data.skills.length) {
    document.getElementById('skillsSection').style.display = 'block';
    document.getElementById('skillsTags').innerHTML = data.skills
      .map(s => `<span class="skill-tag">${s}</span>`)
      .join('');
  }
}

// Auto-init
if (window.REPORT_DATA) {
  updateReport(window.REPORT_DATA);
}
</script>
</body>
</html>
